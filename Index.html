<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classy Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* Responsive background */
background-image: url("YOUR_IMAGE_URL");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}

/* dark overlay for readability */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

.player{
width:340px;
padding:25px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
box-shadow: 0 15px 40px rgba(0,0,0,0.5);
color:white;
text-align:center;
}

h2{
margin-bottom:15px;
font-weight:500;
}

input[type=file]{
margin-bottom:15px;
color:white;
}

.song-name{
font-size:14px;
margin-top:10px;
opacity:0.85;
}

.progress{
width:100%;
margin-top:20px;
}

.controls{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
}

button{
width:50px;
height:50px;
border:none;
border-radius:50%;
font-size:18px;
cursor:pointer;
background:rgba(255,255,255,0.15);
color:white;
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.35);
}

.volume{
margin-top:15px;
}

/* mobile responsiveness */

@media(max-width:500px){

.player{
width:90%;
padding:20px;
}

button{
width:45px;
height:45px;
}

}

</style>
</head>

<body>

<div class="player">

<h2>🎵 Music Player</h2>

<input type="file" id="fileInput" accept="audio/*">

<div class="song-name" id="songName">No song selected</div>

<audio id="audio"></audio>

<input type="range" id="progress" class="progress" value="0">

<div class="controls">
<button onclick="playMusic()">▶</button>
<button onclick="pauseMusic()">⏸</button>
<button onclick="stopMusic()">⏹</button>
</div>

<div class="volume">
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

</div>

<script>

const audio = document.getElementById("audio")
const fileInput = document.getElementById("fileInput")
const progress = document.getElementById("progress")
const volume = document.getElementById("volume")
const songName = document.getElementById("songName")

fileInput.addEventListener("change", function(){

let file = this.files[0]

if(file){
audio.src = URL.createObjectURL(file)
songName.textContent = file.name
}

})

function playMusic(){
audio.play()
}

function pauseMusic(){
audio.pause()
}

function stopMusic(){
audio.pause()
audio.currentTime = 0
}

audio.addEventListener("timeupdate", () => {
progress.value = (audio.currentTime / audio.duration) * 100
})

progress.addEventListener("input", () => {
audio.currentTime = (progress.value / 100) * audio.duration
})

volume.addEventListener("input", () => {
audio.volume = volume.value
})

</script>

</body>
</html>
