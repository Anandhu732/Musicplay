<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dev Music Player</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial;
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#0d1117;
color:#c9d1d9;
}

/* TOP BAR */

.topbar{
height:50px;
background:#161b22;
border-bottom:1px solid #30363d;
display:flex;
align-items:center;
padding:0 20px;
font-weight:600;
}

/* CONTENT */

.container{
flex:1;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#161b22;
border-right:1px solid #30363d;
padding:15px;
}

.sidebar h3{
margin-bottom:10px;
font-size:14px;
color:#8b949e;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.sidebar li:hover{
background:#21262d;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.song-name{
margin-top:10px;
color:#8b949e;
}

/* PLAYER BAR */

.player-bar{
height:70px;
background:#161b22;
border-top:1px solid #30363d;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
}

/* BUTTONS */

button{
width:40px;
height:40px;
background:#21262d;
border:1px solid #30363d;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#30363d;
}

/* SLIDERS */

.progress{
width:40%;
}

.volume{
width:120px;
}

</style>
</head>

<body>

<div class="topbar">
🎵 Dev Music Player
</div>

<div class="container">

<div class="sidebar">
<h3>Library</h3>
<ul>
<li>🎧 My Music</li>
<li>⭐ Favorites</li>
<li>📁 Local Files</li>
</ul>
</div>

<div class="main">

<input type="file" id="fileInput" accept="audio/*">

<div class="song-name" id="songName">
No song selected
</div>

<audio id="audio"></audio>

</div>

</div>

<div class="player-bar">

<button onclick="playMusic()">▶</button>
<button onclick="pauseMusic()">⏸</button>
<button onclick="stopMusic()">⏹</button>

<input type="range" id="progress" class="progress" value="0">

<input type="range" id="volume" class="volume" min="0" max="1" step="0.01" value="1">

</div>

<script>

const audio=document.getElementById("audio")
const fileInput=document.getElementById("fileInput")
const progress=document.getElementById("progress")
const volume=document.getElementById("volume")
const songName=document.getElementById("songName")

fileInput.addEventListener("change",function(){

let file=this.files[0]

if(file){
audio.src=URL.createObjectURL(file)
songName.textContent=file.name
}

})

function playMusic(){ audio.play() }
function pauseMusic(){ audio.pause() }

function stopMusic(){
audio.pause()
audio.currentTime=0
}

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100

})

progress.addEventListener("input",()=>{

audio.currentTime=(progress.value/100)*audio.duration

})

volume.addEventListener("input",()=>{

audio.volume=volume.value

})

/* REGISTER SERVICE WORKER */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
